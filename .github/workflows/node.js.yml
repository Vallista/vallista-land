# main 브랜치에 push 되면 apps/blog(Astro) 를 빌드해서
# Vallista/vallista.github.io 레포의 main 브랜치에 배포한다.

name: Deploy blog

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build blog (Astro + Pagefind)
        run: pnpm build:blog

      - name: Configure git identity
        run: |
          git config --global user.email "mgh950714@gmail.com"
          git config --global user.name "vallista"

      - name: Deploy to vallista.github.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TOKEN: ${{ secrets.TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm --filter @vallista/blog-astro run deploy:only
