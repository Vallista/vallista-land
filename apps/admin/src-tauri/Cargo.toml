[package]
name = "pensmith"
version = "0.0.1"
description = "Pensmith — vallista's personal workshop"
authors = ["vallista"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "pensmith_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
gray_matter = "0.2"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
